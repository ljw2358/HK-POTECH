<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK | GLOBAL SUPREMACY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --pi: #FF8C00; --neon: #00FF7F; --red: #FF4500; --bg: #000; --card: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; }
        .container { width: 100%; max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 70px; }

        /* 상단 언어 제어바 */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 20px; }
        .node-st { color: var(--neon); font-size: 11px; font-weight: 900; letter-spacing: 1px; }
        .lang-trigger { border: 2.5px solid var(--gold); color: var(--gold); padding: 8px 18px; border-radius: 12px; font-size: 14px; font-weight: 950; cursor: pointer; background: rgba(255,215,0,0.15); }

        /* 브랜드 헤더 */
        .brand-header { text-align: center; padding: 15px 0 35px; }
        .brand-logo { font-size: 44px; font-weight: 950; color: var(--gold); margin: 0; text-shadow: 0 0 15px rgba(255,215,0,0.4); }

        /* 자산 요약 메인 */
        .asset-card { background: linear-gradient(155deg, #1a1a1a 0%, #000 100%); border: 2px solid #252525; border-radius: 40px; margin: 0 20px; padding: 45px 20px; text-align: center; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .apr-val { position: absolute; top: 22px; right: 28px; color: var(--neon); font-weight: 950; font-size: 17px; }
        .asset-txt { color: var(--gold); font-size: 19px; font-weight: 900; margin-bottom: 12px; }
        .bal-val { font-size: 58px; font-weight: 950; margin: 25px 0; }
        .gcv-box { display: inline-block; border: 3.5px solid var(--neon); border-radius: 28px; padding: 18px 38px; color: var(--neon); font-weight: 950; font-size: 21px; line-height: 1.4; box-shadow: 0 0 20px rgba(0,255,127,0.2); }

        /* 6대 핵심 서비스 그리드 */
        .srv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; padding: 45px 25px; }
        .srv-item { text-align: center; transition: 0.2s; }
        .icon-hex { width: 82px; height: 82px; background: rgba(255,255,255,0.09); border-radius: 28px; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; }
        .icon-hex i { font-size: 34px; }
        .srv-name { font-weight: 800; font-size: 16px; }

        /* 유동성 풀 데이터 */
        .liq-section { border-left: 7px solid var(--gold); margin: 0 28px 40px; padding-left: 22px; }
        .st-1 { color: var(--pi); font-weight: 950; font-size: 18px; }
        .st-2 { color: var(--gold); font-weight: 950; font-size: 17px; margin: 6px 0; }
        .st-v { font-size: 32px; font-weight: 950; letter-spacing: 0.5px; }
        .st-3 { color: #00ccff; font-weight: 950; margin-top: 10px; font-size: 17px; }

        /* 핵심 액션 버튼 트리오 */
        .act-group { display: flex; gap: 12px; padding: 0 20px; margin-bottom: 45px; }
        .btn-m { flex: 1; height: 78px; border-radius: 22px; border: none; font-size: 19px; font-weight: 950; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .btn-m:active { transform: scale(0.95); }
        .b-pi { background: #000; border: 3.5px solid var(--gold); color: #fff; }
        .b-sw { background: var(--pi); color: #fff; }
        .b-lp { background: var(--neon); color: #000; }

        /* 고객지원 및 소셜 */
        .cs-cta { width: calc(100% - 40px); height: 88px; background: var(--red); color: #fff; border-radius: 28px; border: none; margin: 0 20px 35px; font-size: 22px; font-weight: 950; display: flex; align-items: center; justify-content: center; gap: 18px; box-shadow: 0 12px 25px rgba(255, 69, 0, 0.4); }
        .sns-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; padding: 0 20px; }
        .sns-box { background: #0d0d0d; border-radius: 28px; padding: 28px; border: 2px solid #1a1a1a; text-align: center; text-decoration: none; color: #fff; }
        .sns-box i { font-size: 42px; margin-bottom: 12px; display: block; }

        /* 20개국어 매머드 모달 */
        #lPop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; justify-content: center; align-items: center; z-index: 99999; backdrop-filter: blur(5px); }
        .pop-card { background: #ffffff; color: #000000; width: 92%; max-height: 85vh; border-radius: 45px; padding: 40px; overflow-y: auto; }
        .pop-item { display: flex; align-items: center; gap: 22px; padding: 22px 0; border-bottom: 2.5px solid #f5f5f5; font-weight: 950; font-size: 21px; cursor: pointer; }
        .p-radio { width: 28px; height: 28px; border-radius: 50%; border: 3.5px solid #ddd; position: relative; }
        .p-radio.act { border-color: #007bff; background: #007bff; }

        .f-txt { text-align: center; padding: 60px 0; color: #555; font-size: 14px; font-weight: 900; line-height: 2; }
    </style>
</head>
<body>

<div class="container">
    <nav class="top-nav">
        <div class="node-st">🛰️ SECURE NODE: HK-V190-SUPREME</div>
        <div class="lang-trigger" id="d-lang" onclick="tgL()">KR (한국어) ⌵</div>
    </nav>

    <header class="brand-header"><h1 class="brand-logo" id="d-bank">HK WORLD BANK</h1></header>

    <section class="asset-card">

        <div class="gcv-box" id="d-gcv">가치 평가: $ 125,663,600<br>(GCV CONSENSUS)</div>
    </section>

    <section class="srv-grid" id="srvGrid"></section>

    <section class="liq-section">
        <div class="st-1" id="d-st1">STAKING APR 31.4%</div>
        <div class="st-2" id="d-st2">유동성 풀 $</div>
        <div class="st-v">88,401,773,756</div>
        <div class="st-3" id="d-st3">HK_퀀텀_쉴드_보안_활성</div>
    </section>

    <div class="act-group">
        <button class="btn-m b-pi" id="d-b1">Pi 수량</button>
        <button class="btn-m b-sw" id="d-b2">SWAP</button>
        <button class="btn-m b-lp" id="d-b3">LP 공급</button>
    </div>

    <button class="cs-cta" id="d-cs"><i class="fa-solid fa-headset"></i> 24/7 고객지원센터</button>

    <div class="sns-wrap">
        <a href="#" class="sns-box"><i class="fa-brands fa-youtube" style="color:#f00;"></i><div style="font-weight:950; margin-top:12px;">hyekong2025</div><small style="color:#666;">YouTube</small></a>
        <a href="#" class="sns-box"><i class="fa-brands fa-tiktok"></i><div style="font-weight:950; margin-top:12px;">hyekong2025</div><small style="color:#666;">TikTok</small></a>
    </div>

    <footer class="f-txt">© 2026 HK GROUP GLOBAL HEGEMONY.<br>CHAIRMAN LEE JAEWAN. ALL RIGHTS RESERVED.</footer>
</div>

<div id="lPop"><div class="pop-card" id="lList"></div></div>

<script>
    /* 국정원 보안 돌파용 20개국어 마스터 엔진 */
    const MASTER_DB = {
        ko: { n:"KR (한국어)", bank:"HK WORLD BANK", asset:"메인 자산 통합 원장", gcv:"가치 평가: $ 125,663,600", menu:["송금","결제","예치","보상","소득","스왑"], btns:["Pi 수량","SWAP","LP 공급"], cs:"24/7 고객지원센터", st:["STAKING APR 31.4%","유동성 풀 $","HK_퀀텀_쉴드_보안_활성"] },
        ua: { n:"UA (Українська)", bank:"HK СВІТОВИЙ БАНК", asset:"ГОЛОВНИЙ РЕЄСТР АКТИВІВ", gcv:"ОЦІНКА: $ 125,663,600", menu:["ПЕРЕКАЗ","ОПЛАТА","ДЕПОЗИТ","НАГОРОДА","ДОХІД","ОБМІН"], btns:["К-сть Pi","SWAP","LP ПОСТАВКА"], cs:"ЦІЛОДОБОВА ПІДТРИМКА", st:["СТЕЙКІНГ 31.4%","ПУЛ ЛІКВІДНОСТІ $","HK_КВАНТОВИЙ_ЩИТ"] },
        ar: { n:"AR (العربية)", bank:"HK مصرف العالم", asset:"دفتر الأصول الرئيسي", gcv:"التقييم: $ 125,663,600", menu:["إرسال","دفع","تخزين","مكافأة","دخل","تبادل"], btns:["كمية Pi","SWAP","تزويد LP"], cs:"دعم عالمي 24/7", st:["تخزين 31.4%","مجمع السيولة $","HK_درع الكم"] },
        in: { n:"IN (हिन्दी)", bank:"HK वर्ल्ड बैंक", asset:"मुख्य संपत्ति लेजर", gcv:"मूल्यांकन: $ 125,663,600", menu:["भेजें","भुगतान","जमा","इनाम","आय","स्वैप"], btns:["Pi मात्रा","SWAP","LP आपूर्ति"], cs:"24/7 वैश्विक सहायता", st:["स्टे킹 31.4%","लिक्विडिटी पूल $","HK_क्वांटम_शील्ड"] },
        vn: { n:"VN (Tiếng Việt)", bank:"HK NGÂN HÀNG THẾ GIỚI", asset:"SỔ CÁI TÀI SẢN CHÍNH", gcv:"ĐỊNH GIÁ: $ 125,663,600", menu:["GỬI","THANH TOÁN","GỬI TIẾT KIỆM","THƯỞNG","THU NHẬP","SWAP"], btns:["Số lượng Pi","SWAP","Cung cấp LP"], cs:"HỖ TRỢ TOÀN CẦU 24/7", st:["LÃI SUẤT 31.4%","BỂ THANH KHOẢN $","HK_GIÁP_LƯỢNG_TỬ"] },
        us: { n:"US (English)", bank:"HK WORLD BANK", asset:"MAIN ASSET LEDGER", gcv:"VALUATION: $ 125,663,600", menu:["SEND","PAY","STAKE","REWARD","INCOME","SWAP"], btns:["Pi Qty","SWAP","LP Supply"], cs:"24/7 GLOBAL SUPPORT", st:["STAKING 31.4%","LIQUIDITY POOL $","HK_QUANTUM_SHIELD"] },
        jp: { n:"JP (日本語)", bank:"HK世界銀行", asset:"主要資産統合台帳", gcv:"評価額: $ 125,663,600", menu:["送金","決済","預金","報酬","所得","スワップ"], btns:["Pi 数量","SWAP","LP供給"], cs:"24/7グローバルサポート", st:["ステーキング 31.4%","流動性プール $","HK_量子シールド"] },
        cn: { n:"CN (简体)", bank:"HK世界银行", asset:"主要资产整合账本", gcv:"评估价值: $ 125,663,600", menu:["转账","支付","存款","奖励","收入","交换"], btns:["Pi 数量","SWAP","LP供应"], cs:"24/7全球客户支持", st:["质押 31.4%","流动性池 $","HK_量子屏蔽"] }
    };
    // 추가 국가들 기본값 US로 확장
    ["es","pt","de","fr","it","ru","id","th","tr","ph","my","pl"].forEach(c => { MASTER_DB[c] = MASTER_DB.us; MASTER_DB[c].n = c.toUpperCase() + " (Global)"; });

    const ICONS = [{i:"fa-paper-plane",c:"#4da6ff"},{i:"fa-shopping-bag",c:"#ff66cc"},{i:"fa-utensils",c:"#fff"},{i:"fa-gift",c:"var(--gold)"},{i:"fa-balance-scale",c:"#b3ff66"},{i:"fa-sync",c:"#9966ff"}];

    function tgL() { const m = document.getElementById('lPop'); m.style.display = m.style.display==='flex'?'none':'flex'; }

    /* [초강력 변환 엔진] 클릭 즉시 데이터 치환 */
    window.swapL = function(k) {
        const d = MASTER_DB[k];
        document.getElementById('d-lang').innerText = d.n + " ⌵";
        document.getElementById('d-bank').innerText = d.bank;
        document.getElementById('d-asset').innerText = d.asset;
        document.getElementById('d-gcv').innerHTML = d.gcv + "<br>(GCV CONSENSUS)";
        document.getElementById('d-b1').innerText = d.btns[0];
        document.getElementById('d-b2').innerText = d.btns[1];
        document.getElementById('d-b3').innerText = d.btns[2];
        document.getElementById('d-cs').innerHTML = `<i class="fa-solid fa-headset"></i> ` + d.cs;
        document.getElementById('d-st1').innerText = d.st[0];
        document.getElementById('d-st2').innerText = d.st[1];
        document.getElementById('d-st3').innerText = d.st[2];

        const grid = document.getElementById('srvGrid'); grid.innerHTML = '';
        d.menu.forEach((v, i) => {
            grid.innerHTML += `<div class="srv-item"><div class="icon-hex"><i class="fa-solid ${ICONS[i].i}" style="color:${ICONS[i].c}"></i></div><span class="srv-name">${v}</span></div>`;
        });
        tgL();
    };

    const list = document.getElementById('lList');
    Object.keys(MASTER_DB).forEach(k => {
        list.innerHTML += `<div class="pop-item" onclick="swapL('${k}')"><div class="p-radio ${k==='ko'?'act':''}"></div><span>${MASTER_DB[k].n}</span></div>`;
    });

    window.onload = () => swapL('ko');
</script>
</body>
</html>
