<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK-WorldBank | Global AI Asset Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+KR:wght@300;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background: radial-gradient(circle at top, #1e293b, #070b14); color: white; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); transition: 0.4s ease; }
        .glass:hover { border: 1px solid rgba(251, 191, 36, 0.4); box-shadow: 0 0 30px rgba(251, 191, 36, 0.1); }
        .hkwb-logo { font-family: 'Orbitron', sans-serif; letter-spacing: 3px; background: linear-gradient(90deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(251, 191, 36, 0.3)); }
        .gradient-text { background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-online { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 15px #22c55e; animation: pulse-green 2s infinite; }
        @keyframes pulse-green { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-12">

    <nav class="flex flex-col lg:flex-row justify-between items-center gap-6 mb-12">
        <h1 class="text-4xl font-black hkwb-logo">HK-WorldBank</h1>
        <div class="flex flex-wrap justify-center items-center gap-4">
            <select id="langSelect" onchange="changeLang()" class="glass rounded-full px-6 py-2 text-sm text-yellow-500 focus:outline-none cursor-pointer border-yellow-500/30">
                <option value="ko">🇰🇷 한국어</option>
                <option value="en">🇺🇸 English</option>
                <option value="es">🇪🇸 Español (Spanish)</option>
                <option value="fr">🇫🇷 Français (French)</option>
                <option value="de">🇩🇪 Deutsch (German)</option>
                <option value="zh">🇨🇳 中文</option>
                <option value="ja">🇯🇵 日本語</option>
                <option value="vi">🇻🇳 Tiếng Việt</option>
                <option value="id">🇮🇩 Indonesia</option>
                <option value="th">🇹🇭 ไทย</option>
                <option value="hi">🇮🇳 हिन्दी</option>
                <option value="ru">🇷🇺 Русский</option>
                <option value="ar">🇸🇦 العربية</option>
                <option value="pt">🇵🇹 Português</option>
                <option value="tl">🇵🇭 Tagalog</option>
            </select>
            <div class="flex items-center gap-2 glass px-4 py-2 rounded-full border-green-500/20">
                <div class="status-online"></div>
                <span class="text-[10px] uppercase font-bold tracking-tighter text-green-400">Node v21.2 Active</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto space-y-10">
        
        <section class="glass rounded-[50px] p-10 text-center relative overflow-hidden border-b-4 border-yellow-500/50">
            <h2 id="txt-title" class="text-gray-500 text-sm font-bold uppercase tracking-widest mb-4">현재 내 자산 실시간 성장률</h2>
            <div class="flex flex-col items-center justify-center">
                <div class="flex items-baseline gap-3">
                    <span id="liveAmount" class="text-6xl md:text-8xl font-black gradient-text">0.00000000</span>
                    <span class="text-2xl font-bold text-yellow-500">π</span>
                </div>
                <p id="txt-sub-growth" class="text-green-400 text-xs mt-6 font-medium bg-green-500/10 px-4 py-1 rounded-full border border-green-500/20">
                    31.4% 고정 복리 엔진이 초 단위로 작동 중입니다
                </p>
            </div>
        </section>

        <div class="grid grid-cols-1 xl:grid-cols-2 gap-10">
            <div class="glass rounded-[50px] p-10 space-y-8">
                <h3 id="txt-sim-title" class="text-2xl font-bold">전략 시뮬레이션</h3>
                <div class="space-y-6">
                    <div>
                        <label id="txt-label-input" class="text-xs text-gray-400 mb-2 block ml-2">보유 파이 수량 입력</label>
                        <input type="number" id="inputAmt" oninput="runIntelligence()" placeholder="2200" class="w-full bg-white/5 border border-white/10 rounded-3xl px-8 py-5 text-2xl font-bold focus:outline-none focus:border-yellow-500 transition-all">
                    </div>
                    <div>
                        <label id="txt-label-select" class="text-xs text-gray-400 mb-2 block ml-2">스테이킹 목표 기간</label>
                        <select id="inputPeriod" onchange="runIntelligence()" class="w-full bg-white/10 border border-white/10 rounded-3xl px-8 py-5 text-xl font-bold focus:outline-none">
                            <option value="1">1 Month</option>
                            <option value="6">6 Months</option>
                            <option value="12" selected>12 Months</option>
                            <option value="36">36 Months</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="glass rounded-[50px] p-10 border-t-8 border-yellow-500 flex flex-col justify-between">
                <div>
                    <p id="txt-result-label" class="text-xs text-gray-500 font-bold uppercase mb-2">만기 시 예상 자산 수량</p>
                    <p id="resultDisplay" class="text-5xl font-black text-white">0.00 π</p>
                </div>
                <div class="mt-8 bg-yellow-500/5 rounded-3xl p-6 border border-yellow-500/10">
                    <p class="text-[10px] text-yellow-500 font-black mb-2 tracking-tighter uppercase">BINI AI STRATEGY ADVICE</p>
                    <p id="aiAdvice" class="text-sm text-gray-300 leading-relaxed italic">보유량을 입력하시면 최적의 스테이킹 전략을 추천합니다.</p>
                </div>
            </div>
        </div>

        <section class="glass rounded-[50px] p-10 relative">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h3 id="txt-bh-title" class="text-2xl font-bold">1,000,000,000 π 블랙홀 프로젝트</h3>
                    <p id="txt-bh-sub" class="text-gray-500 text-sm mt-1">HKWB는 전 세계 모든 유동성을 흡수합니다.</p>
                </div>
                <div class="text-right">
                    <span class="text-yellow-500 text-3xl font-black">13.65%</span>
                </div>
            </div>
            <div class="w-full bg-white/5 h-6 rounded-full overflow-hidden p-1 border border-white/10">
                <div class="h-full bg-gradient-to-r from-yellow-700 via-yellow-400 to-yellow-600 rounded-full shadow-[0_0_20px_rgba(251,191,36,0.6)]" style="width: 13.65%"></div>
            </div>
        </section>

    </main>

    <script>
        const langData = {
            ko: { title: "현재 내 자산 실시간 성장률", sub: "31.4% 고정 복리 엔진이 초 단위로 작동 중입니다", sim: "전략 시뮬레이션", lIn: "보유 파이 수량 입력", lSe: "스테이킹 목표 기간", res: "만기 시 예상 자산 수량", bhT: "10억 개 파이 블랙홀 프로젝트", bhS: "HKWB는 전 세계 모든 유동성을 흡수합니다.", adv0: "보유량을 입력하시면 최적의 스테이킹 전략을 추천합니다.", adv1: "단기 스테이킹은 복리 효과가 낮습니다. 최소 12개월 이상을 추천합니다!", adv2: "탁월한 선택입니다. 1년 이상 예치 시 자산 성장 곡선이 급격히 상승합니다.", adv3: "완벽한 규모입니다. 수요일에 하실 2,200개와 합쳐지면 금융 제국이 시작됩니다!" },
            en: { title: "My Real-time Asset Growth", sub: "31.4% Fixed Compound Interest Engine Active", sim: "Strategy Simulation", lIn: "Enter Pi Balance", lSe: "Staking Period", res: "Expected Future Balance", bhT: "1B Pi Black Hole Project", bhS: "HKWB absorbs all global liquidity.", adv0: "Enter data for AI Strategy Advice.", adv1: "Short-term is okay, but 12 months+ maximizes your profit.", adv2: "Excellent! 12 months or more puts you on the wealth fast track.", adv3: "Perfect strategy. Let's dominate the market together!" },
            es: { title: "Crecimiento de Activos en Tiempo Real", sub: "Motor de Interés Compuesto del 31.4% Activo", sim: "Simulación de Estrategia", lIn: "Ingresar Saldo Pi", lSe: "Periodo de Staking", res: "Saldo Futuro Esperado", bhT: "Proyecto Agujero Negro de 1B Pi", bhS: "HKWB absorbe toda la liquidez global.", adv0: "Ingrese datos para el asesoramiento de IA.", adv1: "El corto plazo está bien, ¡pero más de 12 meses maximizan tus ganancias!", adv2: "¡Excelente! 12 meses o más lo ponen en la vía rápida de la riqueza.", adv3: "Estrategia perfecta. ¡Dominemos el mercado juntos!" },
            fr: { title: "Croissance des Actifs en Temps Réel", sub: "Moteur d'Intérêt Composé de 31,4 % Activé", sim: "Simulation de Stratégie", lIn: "Entrer le Solde Pi", lSe: "Période de Staking", res: "Solde Futur Prévu", bhT: "Projet Trou Noir 1B Pi", bhS: "HKWB absorbe toute la liquidité mondiale.", adv0: "Entrez des données pour les conseils de l'IA.", adv1: "Le court terme est correct, mais 12 mois+ maximise votre profit !", adv2: "Excellent ! 12 mois ou plus vous placent sur la voie rapide de la richesse.", adv3: "Stratégie parfaite. Dominons le marché ensemble !" },
            de: { title: "Asset-Wachstum in Echtzeit", sub: "31,4 % Zinseszins-Motor Aktiv", sim: "Strategie-Simulation", lIn: "Pi-Guthaben eingeben", lSe: "Staking-Zeitraum", res: "Erwarteter zukünftiger Kontostand", bhT: "1B Pi Schwarzes Loch Projekt", bhS: "HKWB absorbiert alle globale Liquidität.", adv0: "Daten für KI-Strategieberatung eingeben.", adv1: "Kurzfristig ist okay, aber 12 Monate+ maximiert Ihren Gewinn!", adv2: "Ausgezeichnet! 12 Monate oder mehr bringen Sie auf die Überholspur des Reichtums.", adv3: "Perfekte Strategie. Lassen Sie uns gemeinsam den Markt dominieren!" },
            zh: { title: "我的资产实时增长", sub: "31.4% 固定复利引擎正在运行", sim: "策略模拟", lIn: "输入派币数量", lSe: "质押期限", res: "到期预期总量", bhT: "10亿派币黑洞项目", bhS: "HKWB 吸收全球所有流动性。", adv0: "输入数据以获取 AI 建议。", adv1: "短期虽然灵活，但长期更有利于复利收益。", adv2: "太棒了！一年以上的质押将大幅提升您的资产价值。", adv3: "完美。让我们一起掌控市场！" }
        };

        function changeLang() {
            const lang = document.getElementById('langSelect').value;
            const t = langData[lang] || langData['en'];
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('txt-sub-growth').innerText = t.sub;
            document.getElementById('txt-sim-title').innerText = t.sim;
            document.getElementById('txt-label-input').innerText = t.lIn;
            document.getElementById('txt-label-select').innerText = t.lSe;
            document.getElementById('txt-result-label').innerText = t.res;
            document.getElementById('txt-bh-title').innerText = t.bhT;
            document.getElementById('txt-bh-sub').innerText = t.bhS;
            runIntelligence();
        }

        let liveAmount = 0;
        function runIntelligence() {
            const amount = parseFloat(document.getElementById('inputAmt').value) || 0;
            const months = parseInt(document.getElementById('inputPeriod').value);
            const rate = 0.314;
            liveAmount = amount;

            const future = amount * Math.pow((1 + rate), (months / 12));
            document.getElementById('resultDisplay').innerText = future.toLocaleString(undefined, {minimumFractionDigits: 2}) + " π";

            const lang = document.getElementById('langSelect').value;
            const t = langData[lang] || langData['en'];
            let adv = t.adv0;
            if(amount > 0) {
                if(months < 12) adv = t.adv1;
                else if(months >= 12) adv = t.adv2;
                if(amount >= 2000) adv = t.adv3;
            }
            document.getElementById('aiAdvice').innerText = adv;
        }

        setInterval(() => {
            if (liveAmount > 0) {
                const perSecond = (liveAmount * 0.314) / (365 * 24 * 3600);
                liveAmount += perSecond;
                document.getElementById('liveAmount').innerText = liveAmount.toFixed(8);
            }
        }, 1000);
    </script>
</body>
</html>
