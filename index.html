        /* 1. CORE SYSTEM THEME */
        :root {
            --gold: #FFD700; --green: #00FF00; --orange: #FF9900;

        }

        /* 2. BASE RESET */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
        body { background: var(--bg); color: var(--txt); overflow-x: hidden; padding-bottom: 120px; }

        /* 3. LAYOUT CONTAINER */
        .hk-container { width: 100%; max-width: 520px; margin: 0 auto; padding: 40px 20px; }
        
        /* 4. TOP SYSTEM STATUS BAR */
        .sys-st-bar { 
            font-size: 11px; color: #555; font-weight: 900; 
            letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; 
            border-bottom: 1px solid #111; padding-bottom: 10px;
        }

        /* 5. MULTI-LANGUAGE SELECTOR (GCV CORE) */
        .lang-control { 
            background: #000; border: 3px solid var(--gold); border-radius: 15px; 
            padding: 15px 25px; color: var(--gold); font-weight: 900; font-size: 16px; 
            width: 100%; margin-bottom: 35px; cursor: pointer; outline: none;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1); transition: 0.3s;
        }
        .lang-control:hover { background: #0a0a0a; box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); }

        /* 6. BRANDING HUB */
        .brand-box { text-align: center; margin-bottom: 50px; }
        .hk-logo { font-size: 60px; font-weight: 900; color: var(--gold); line-height: 0.95; letter-spacing: -4px; }
        .hk-node-id { color: var(--green); font-size: 13px; font-weight: 800; margin-top: 20px; letter-spacing: 3px; }

        /* 7. THE MASTER VAULT (PI ASSET) */
        .pi-vault {
            background: linear-gradient(165deg, #1a1a1a, #000); border: 3px solid #222; border-radius: 50px;
            padding: 60px 30px; text-align: center; margin-bottom: 45px; 
            box-shadow: 0 40px 80px rgba(0,0,0,1); position: relative;
            overflow: hidden;
        }
        .pi-vault::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,215,0,0.03) 0%, transparent 70%);
        }
        .apr-badge { position: absolute; top: 30px; right: 40px; color: var(--green); font-size: 18px; font-weight: 900; }
        .v-label { color: var(--gold); font-size: 22px; font-weight: 800; margin-bottom: 35px; letter-spacing: 2px; }
        .pi-balance { font-size: 70px; font-weight: 900; color: #fff; margin-bottom: 40px; letter-spacing: -4px; }
        .pi-sym { font-size: 40px; color: var(--orange); margin-left: 12px; }
        .gcv-valuation { 
            background: rgba(0,255,0,0.1); border: 3px solid var(--green); border-radius: 70px; 
            padding: 22px 40px; color: var(--green); font-size: 26px; font-weight: 900; 
            display: inline-block; transition: 0.4s;
        }

        /* 8. GLOBAL FUNCTIONAL GRID */
        .service-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-bottom: 50px; }
        .grid-item { text-align: center; font-size: 16px; font-weight: 800; color: #eee; }
        .grid-ico { 
            width: 90px; height: 90px; background: #0a0a0a; border: 2.5px solid #1a1a1a; border-radius: 32px; 
            display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; font-size: 38px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .grid-ico:hover { border-color: var(--gold); transform: scale(1.1) rotate(5deg); background: #111; }

        /* 9. LIQUIDITY INFRASTRUCTURE PANEL */
        .infra-panel { background: #050505; border-left: 8px solid var(--gold); border-radius: 25px; padding: 35px; margin-bottom: 45px; }
        .lp-label { color: var(--orange); font-size: 16px; font-weight: 800; margin-bottom: 18px; display: block; text-transform: uppercase; }
        .lp-value { font-size: 28px; font-weight: 900; color: #fff; letter-spacing: 1.5px; }

        /* 10. SYSTEM ACTION AREA */
        .action-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 50px; }
        .hk-btn { padding: 25px 5px; border-radius: 20px; font-weight: 900; font-size: 16px; color: #fff; border: none; cursor: pointer; transition: 0.2s; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

            text-align: center; font-weight: 900; font-size: 20px; box-shadow: 0 15px 40px rgba(255, 153, 0, 0.4);

        setTimeout(() => {
            // Update Text Content

            ui.node.innerText = data.node;

            ui.gcvText.innerText = data.gcv;

            ui.btn2.innerText = data.btns[1];
            ui.btn3.innerText = data.btns[2];
            ui.cs.innerHTML = `<i class="fa-solid fa-headset"></i>` + data.cs;

            // Generate Grid Items

            data.menu.forEach((label, i) => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.innerHTML = `<div class="grid-ico">${icons[i]}</div><span>${label}</span>`;

            });

            // Direction Control

            // System Status Update
            ui.status.innerText = `NODE-SYNCED: ${data.name} | GCV-STABLE`;
            document.body.style.opacity = 1;
        }, 150);
    }
