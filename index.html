<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK Prototype</title>
    <style>
        /* 모바일 화면 스타일 */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #e0e0e0; /* 폰 배경색 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 스마트폰 형태 */
        .phone-case {
            width: 380px;
            height: 780px;
            background-color: #333;
            border-radius: 40px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            padding: 20px 10px;
            position: relative;
            overflow: hidden;
        }

        /* 폰 베젤/홈버튼 등 (간단하게) */
        .notch { width: 150px; height: 30px; background: black; position: absolute; top: 0; left: 115px; border-radius: 0 0 15px 15px; z-index: 10; }
        .bottom-bar { width: 120px; height: 5px; background: white; position: absolute; bottom: 10px; left: 130px; border-radius: 5px; }

        /* 실제 앱 화면 */
        .app-screen {
            width: 100%;
            height: 100%;
            background-color: #121212; /* 다크 모드 */
            border-radius: 30px;
            overflow-y: auto; /* 세로 스크롤 가능 */
            position: relative;
        }

        /* 상단 바 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            color: white;
            font-size: 14px;
        }

        /* 브라우저/주소창 */
        .address-bar {
            padding: 5px 15px;
            background: #2a2a2a;
            color: #aaa;
            font-size: 12px;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
        }
        .address-bar img { width: 16px; margin-right: 5px; }

        /* 언어 선택 (국기) */
        .language-selector {
            padding: 5px 15px;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            background: #1e1e1e;
        }
        .flag-icon { width: 20px; height: 15px; cursor: pointer; border: 1px solid #444; }

        /* 타이틀 */
        .app-title {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #f7d73c; /* 노란색 */
            margin: 15px 0;
            text-shadow: 0 0 5px rgba(247,215,60,0.7);
        }

        /* 메인 자산 박스 */
        .asset-box {
            background-color: #1e1e1e;
            margin: 0 15px;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }
        .asset-box .label { color: #f7d73c; font-size: 14px; margin-bottom: 10px; }
        .asset-box .balance { font-size: 40px; color: white; font-weight: bold; margin-bottom: 5px; }
        .asset-box .balance span { font-size: 24px; color: #f7d73c; }
        .asset-box .value { 
            background-color: #00e676; 
            color: #000; 
            padding: 5px 10px; 
            border-radius: 20px; 
            font-weight: bold; 
            display: inline-block;
            font-size: 14px;
        }

        /* 기능 아이콘 (그리드) */
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 20px 15px;
        }
        .icon-item {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            color: white;
            cursor: pointer;
        }
        .icon-item img { width: 32px; height: 32px; margin-bottom: 5px; }
        .icon-item p { margin: 0; font-size: 14px; }

        /* 스테이킹 정보 */
        .staking-info {
            background-color: #1e1e1e;
            margin: 0 15px;
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid #f7d73c;
            color: white;
            font-size: 14px;
        }

        /* ------------------ (2번째 이미지 요소) ------------------ */

        /* [요청] SAFE-CUSTODY FEE 제거: 이 부분은 코드에 포함하지 않음 */

        /* [요청] 스테이킹 12%로 변경 */
        .main-amount-box {
            text-align: center;
            margin: 20px 0;
            color: white;
        }
        .staking-rate { color: #f7d73c; font-size: 14px; }
        .big-amount { font-size: 28px; font-weight: bold; color: #f7d73c; }

        /* 버튼 영역 */
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 0 15px 15px;
        }
        .button-group div {
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-youtube { background-color: #ff0000; }
        .btn-tiktok { background-color: #25f4ee; color: #000; }

        /* 보안 정보 */
        .security-box {
            background-color: #1e1e1e;
            margin: 0 15px 20px;
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 13px;
        }
        .security-box h4 { margin-top: 0; color: #00e676; font-size: 15px; }
        .security-list { list-style: none; padding: 0; margin: 0; }
        .security-list li { margin-bottom: 5px; color: #00e676; }
        .security-list li::before { content: "◆ "; margin-right: 5px; }

        /* [요청] 예치 APY 12% 변경 */
        .bottom-apy {
            position: absolute;
            bottom: 30px;
            left: 15px;
            right: 15px;
            text-align: center;
            font-size: 24px;
            color: #f7d73c;
            font-weight: bold;
            background-color: rgba(18,18,18,0.8);
            padding: 5px;
            border-radius: 5px;
        }

    </style>
</head>
<body>

    <div class="phone-case">
        <div class="notch"></div>
        <div class="bottom-bar"></div>

        <div class="app-screen">
            <div class="top-bar">
                <span><img src="https://via.placeholder.com/16x16?text=U+" alt="">7:80</span> <span><img src="https://via.placeholder.com/16x16?text=🔋" alt=""> 79</span>
            </div>
            <div class="address-bar">
                <img src="https://via.placeholder.com/16x16?text=H" alt=""> hk-world.bank
            </div>

            <div class="language-selector">
                <img src="https://flagicons.lipis.dev/flags/4x3/kr.svg" class="flag-icon" title="한국어">
                <img src="https://flagicons.lipis.dev/flags/4x3/us.svg" class="flag-icon" title="English">
                <img src="https://flagicons.lipis.dev/flags/4x3/jp.svg" class="flag-icon" title="日本語">
                <img src="https://flagicons.lipis.dev/flags/4x3/cn.svg" class="flag-icon" title="中文">
                <img src="https://flagicons.lipis.dev/flags/4x3/gb.svg" class="flag-icon" title="UK">
                <img src="https://flagicons.lipis.dev/flags/4x3/ca.svg" class="flag-icon" title="Canada">
                <img src="https://flagicons.lipis.dev/flags/4x3/au.svg" class="flag-icon" title="Australia">
                <img src="https://flagicons.lipis.dev/flags/4x3/de.svg" class="flag-icon" title="Germany">
                <img src="https://flagicons.lipis.dev/flags/4x3/fr.svg" class="flag-icon" title="France">
                <img src="https://flagicons.lipis.dev/flags/4x3/es.svg" class="flag-icon" title="Spain">
                <img src="https://flagicons.lipis.dev/flags/4x3/it.svg" class="flag-icon" title="Italy">
                <img src="https://flagicons.lipis.dev/flags/4x3/br.svg" class="flag-icon" title="Brazil">
                <img src="https://flagicons.lipis.dev/flags/4x3/in.svg" class="flag-icon" title="India">
                <img src="https://flagicons.lipis.dev/flags/4x3/ru.svg" class="flag-icon" title="Russia">
                <img src="https://flagicons.lipis.dev/flags/4x3/ae.svg" class="flag-icon" title="UAE">
                <img src="https://flagicons.lipis.dev/flags/4x3/sg.svg" class="flag-icon" title="Singapore">
                </div>

            <div class="app-title">HK WORLD BANK</div>

            <div class="asset-box">
                <div class="label">메인 자산 통합 원장</div>
                <div class="balance">400.0212 <span>Pi</span></div>
                <div class="value">가치 평가: $ 125,663,600 (GCV)</div>
            </div>

            <div class="icon-grid">
                <div class="icon-item"><img src="https://via.placeholder.com/32x32?text=S" alt=""><p>송금</p></div>
                <div class="icon-item"><img src="https://via.placeholder.com/32x32?text=P" alt=""><p>결제</p></div>
                <div class="icon-item"><img src="https://via.placeholder.com/32x32?text=E" alt=""><p>예치</p></div>
                <div class="icon-item"><img src="https://via.placeholder.com/32x32?text=R" alt=""><p>보상</p></div>
                <div class="icon-item"><img src="https://via.placeholder.com/32x32?text=K" alt=""><p>기본소득</p></div>
                <div class="icon-item"><img src="https://via.placeholder.com/32x32?text=W" alt=""><p>스왑</p></div>
            </div>

            <div class="main-amount-box">
                <div class="staking-rate">Staking 12.0% | 유동성풀 $</div>
                <div class="big-amount">88,410,819,601</div>
            </div>

            <div class="button-group">
                <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="btn-youtube" style="text-decoration:none;"><div>YOUTUBE</div></a>
                <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="btn-tiktok" style="text-decoration:none;"><div>TIKTOK</div></a>
            </div>

            <div class="security-box">
                <h4>🛡️ HK 양자 방패 가동 중</h4>
                <ul class="security-list">
                    <li>양자 암호화 보안 적용</li>
                    <li>자산 보호 프로토콜 가동</li>
                    <li>AI 실시간 위협 탐지 중</li>
                    <li><strong>(시스템 상태: 자동 연동 구동 준비 완료)</strong></li>
                </ul>
            </div>

            <div class="bottom-apy">예치 (APY 12.0%)</div>

        </div>
    </div>

    <script>
        // 국기 클릭 시 언어 변경 (메시지 표시 예시)
        document.querySelectorAll('.flag-icon').forEach(flag => {
            flag.addEventListener('click', function() {
                alert('언어가 ' + this.title + '(으)로 변경되었습니다. (데모)');
            });
        });

        // '스왑' 아이콘 클릭 시 DEX 자동 연동 개념 데모
        document.querySelector('.icon-grid .icon-item:nth-child(6)').addEventListener('click', function() {
            alert('블록체인 노드에 연결하여 DEX(탈중앙화 거래소)와 스왑 기능을 자동으로 연동합니다... (실제 구현 필요)');
        });

        // 소셜 버튼 클릭 시 확인 메시지
        document.querySelector('.btn-youtube').addEventListener('click', function(e) {
            if(!confirm('유튜브 @Hyekong2025 채널로 이동하시겠습니까?')) { e.preventDefault(); }
        });
        document.querySelector('.btn-tiktok').addEventListener('click', function(e) {
            if(!confirm('틱톡 @hyekong2025 프로필로 이동하시겠습니까?')) { e.preventDefault(); }
        });
    </script>

</body>
</html>
