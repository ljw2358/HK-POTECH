<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK | Global Asset Infrastructure</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 1. 디자인 정체성: 형님의 블랙 & 골드 테마 */
        :root {
            --hk-gold: #FFD700;
            --hk-bg: #000000;
            --hk-card: #141414;
            --hk-green: #39FF14;
            --hk-blue: #2196F3;
        }

        body {
            background-color: var(--hk-bg);
            color: #FFFFFF;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        /* 메인 헤더 스케일 업 */
        .brand-header {
            margin-top: 60px;
            margin-bottom: 30px;
            text-align: center;
        }
        .brand-header h1 {
            color: var(--hk-gold);
            font-size: 38px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            margin: 0;
        }

        /* 2. 초대형 자산 대응 카드 레이아웃 */
        .asset-card {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            width: 92%;
            max-width: 480px;
            border-radius: 40px;
            padding: 50px 20px;
            text-align: center;
            border: 1px solid #222;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            margin-bottom: 30px;
            overflow: hidden;
        }

        .ledger-label {
            color: var(--hk-gold);
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* 수십억/수조 단위 숫자 대응: 폰트 자동 크기 조절 */
        .balance-container {
            display: flex;
            justify-content: center;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 5px;
        }

        .balance-value {
            font-weight: 900;
            color: #FFFFFF;
            /* 숫자가 길어지면 자동으로 크기를 줄여 한 화면에 담음 */
            font-size: clamp(35px, 8vw, 65px);
            line-height: 1;
            letter-spacing: -1px;
        }

        .balance-unit {
            color: var(--hk-gold);
            font-size: 24px;
            font-weight: 700;
        }

        .gcv-eval-badge {
            border: 2px solid var(--hk-green);
            border-radius: 50px;
            padding: 14px 25px;
            color: var(--hk-green);
            font-weight: 900;
            display: inline-block;
            margin-top: 30px;
            font-size: 18px;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }

        /* 3. 6구역 대형 메뉴 그리드 */
        .grid-menu {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 92%;
            max-width: 480px;
        }

        .menu-btn {
            background-color: var(--hk-card);
            border-radius: 25px;
            padding: 35px 10px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #1a1a1a;
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            border-color: var(--hk-gold);
            transform: translateY(-5px);
        }

        .menu-btn:active {
            transform: scale(0.95);
            background-color: #222;
        }

        .menu-btn i {
            font-size: 34px;
            margin-bottom: 15px;
            display: block;
        }

        .menu-btn span {
            font-size: 15px;
            font-weight: 800;
            color: #fff;
        }

        /* 아이콘 색상 커스터마이징 */
        .c-blue { color: #2196F3; }
        .c-orange { color: #FF9800; }
        .c-yellow { color: #FFEB3B; }
        .c-red { color: #F44336; }
        .c-purple { color: #9C27B0; }
        .c-cyan { color: #00BCD4; }

        /* 4. 하단 스테이킹 및 정보 영역 */
        .footer {
            width: 90%;
            text-align: center;
            margin-top: 50px;
            padding-bottom: 80px;
        }

        .apy-highlight {
            color: var(--hk-gold);
            font-size: 34px;
            font-weight: 900;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .system-log-terminal {
            background: #000;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 30px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: var(--hk-green);
            text-align: left;
            height: 80px;
            overflow-y: auto;
        }

        .copyright-text {
            color: #444;
            font-size: 12px;
            line-height: 1.8;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="brand-header">
        <h1>HK WORLD BANK</h1>
    </div>

    <div class="asset-card">
        <div class="ledger-label">메인 자산 통합 원장</div>
        <div class="balance-container">
            <div class="balance-value" id="main-balance">9,280,000,000.0000</div>
            <div class="balance-unit">Pi</div>
        </div>
        <div class="gcv-eval-badge">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div id="terminal" class="system-log-terminal">
        >> HK CORE INFRASTRUCTURE LOADING...<br>
        >> NODE STAKING VOLUME: 9.28B Pi DETECTED.
    </div>

    <div class="grid-menu">
        <div class="menu-btn" onclick="hkFinance.execute('송금', 1000)">
            <i class="fas fa-paper-plane c-blue"></i><span>송금</span>
        </div>
        <div class="menu-btn" onclick="hkFinance.execute('결제', 314159)">
            <i class="fas fa-shopping-cart c-orange"></i><span>결제</span>
        </div>
        <div class="menu-btn" onclick="hkFinance.execute('예치', 1000000)">
            <i class="fas fa-piggy-bank c-yellow"></i><span>예치</span>
        </div>
        <div class="menu-btn" onclick="hkFinance.execute('보상', 500)">
            <i class="fas fa-gift c-red"></i><span>보상</span>
        </div>
        <div class="menu-btn" onclick="hkFinance.execute('기본소득', 1000)">
            <i class="fas fa-balance-scale c-purple"></i><span>기본소득</span>
        </div>
        <div class="menu-btn" onclick="hkFinance.execute('스왑', 50000)">
            <i class="fas fa-sync c-cyan"></i><span>스왑</span>
        </div>
    </div>

    <div class="footer">
        <div class="apy-highlight">예치 (APY 31.4%)</div>
        <div class="copyright-text">
            Chairman Lee Jaewan (Hyekong)<br>
            HK-ROBOTICS & HK-QUANTUM BIO GLOBAL NODE<br>
            © 2026 HK Group. All Rights Reserved.
        </div>
    </div>

<script>
    /**
     * HK-WorldBank Billion-Scale Transaction Engine
     * Powered by HK Group Infrastructure
     */
    const Pi = window.Pi;
    
    // 테스트 파이 구동을 위해 sandbox 활성화
    Pi.init({ version: "1.5", sandbox: true });

    const hkFinance = {
        isReady: false,

        // 초기화 및 지갑 연결
        boot: async function() {
            this.updateLog("보안 네트워크 수립 중...");
            try {
                const auth = await Pi.authenticate(['username', 'payments', 'wallet_address'], this.onIncomplete);
                this.isReady = true;
                this.updateLog(`접속 성공: @${auth.user.username} (HK NODE 인증됨)`);
            } catch (e) {
                this.updateLog("접속 실패: Pi 브라우저를 통해 접속하십시오.");
            }
        },

        // 트랜잭션 실행 (수조 단위 대응)
        execute: async function(action, amount) {
            if(!this.isReady) {
                alert("네트워크 연결이 필요합니다.");
                return;
            }

            this.updateLog(`[${action}] 요청 개시: ${amount.toLocaleString()} Pi`);
            
            try {
                await Pi.createPayment({
                    amount: amount,
                    memo: `HK-WorldBank Global ${action} 트랜잭션`,
                    metadata: { biz: "HK-GROUP", service: action }
                }, {
                    onReadyForServerApproval: (id) => {
                        this.updateLog(`서버 승인 대기 중... ID: ${id.substring(0,10)}`);
                    },
                    onReadyForServerCompletion: (id, txid) => {
                        this.updateLog(`성공! 블록체인 기록 완료: ${txid.substring(0,15)}...`);
                        alert(`HK-WorldBank ${action} 완료!\n금액: ${amount.toLocaleString()} Pi\n상태: 블록체인 승인됨`);
                    },
                    onCancel: (id) => this.updateLog("거래가 사용자에 의해 취소되었습니다."),
                    onError: (err) => this.updateLog(`에러: ${err.message}`)
                });
            } catch (err) {
                this.updateLog("치명적 시스템 오류 발생.");
            }
        },

        updateLog: function(msg) {
            const terminal = document.getElementById('terminal');
            const now = new Date();
            const time = now.toLocaleTimeString();
            terminal.innerHTML += `<br>[${time}] ${msg}`;
            terminal.scrollTop = terminal.scrollHeight;
        },

        onIncomplete: function(p) {
            console.log("미완료 거래 확인됨.");
        }
    };

    window.onload = () => hkFinance.boot();
</script>
</body>
</html>
