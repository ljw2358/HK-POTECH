<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HK-WorldBank Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* [CSS Section] 형님의 사진 속 스타일 100% 복구 */
        :root { 
            --gold: #FFD700; --hk-bg: #2D1B4D; --hk-card: #3B1B63; 
            --green: #00FFB2; --white: #FFFFFF; 
        }
        body { 
            background-color: var(--hk-bg); color: var(--white); 
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; 
        }
        .wrapper { width: 100%; max-width: 480px; margin: auto; position: relative; }
        
        /* 메인 자산 장부 헤더 디자인 (회장님 스타일) */
        .bank-header { 
            padding: 40px 20px; text-align: center; 
            background: linear-gradient(180deg, #3B1B63 0%, #2D1B4D 100%); 
            border-bottom: 3px solid #4A2680; 
        }
        .total-box { 
            background: rgba(255, 215, 0, 0.05); padding: 30px; 
            border-radius: 25px; border: 1px solid var(--gold); 
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.3); 
        }
        .total-box h1 { 
            font-size: 38px; color: var(--gold); margin: 15px 0; 
            letter-spacing: -1.5px; text-shadow: 0 0 10px rgba(255,215,0,0.5); 
        }

        /* 개인별 실시간 자산 창 (유달산 님 타겟 연출) */
        .personal-ledger { 
            display: none; margin: 25px 20px; padding: 25px; 
            background: rgba(0, 255, 178, 0.07); border-radius: 20px; 
            border-left: 6px solid var(--green); border-right: 1px solid rgba(0,255,178,0.2);
        }
        .personal-ledger h2 { font-size: 26px; color: var(--green); margin: 10px 0; }
        .shield-status { 
            font-size: 14px; color: #00FF00; font-weight: bold; 
            animation: pulse-shield 1.5s infinite; 
        }

        /* 다국어 선택기 및 그리드 메뉴 스타일 */
        .lang-container { padding: 15px; text-align: right; }
        #langSel { 
            background: #333; color: white; border: 1px solid var(--gold); 
            padding: 8px 15px; border-radius: 8px; cursor: pointer; 
        }
        .hk-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 15px; padding: 20px; 
        }
        .hk-item { 
            background: var(--hk-card); padding: 20px 10px; 
            border-radius: 15px; text-align: center; border: 1px solid #555; 
        }
        .hk-item i { font-size: 28px; color: var(--gold); margin-bottom: 12px; }
        .hk-item span { font-size: 13px; font-weight: bold; display: block; }

        @keyframes pulse-shield { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="lang-container">
        <select id="langSel" onchange="applyLang()">
            <option value="ko">KOREA (한국어)</option>
            <option value="en">USA (English)</option>
            <option value="zh">CHINA (中文)</option>
            <option value="ja">JAPAN (日本語)</option>

            <option value="vi">VIETNAM (Tiếng Việt)</option>

            <option value="de">GERMANY (Deutsch)</option>
            <option value="fr">FRANCE (Français)</option>
            <option value="es">SPAIN (Español)</option>
            <option value="it">ITALY (Italiano)</option>
            <option value="pt">PORTUGAL (Português)</option>
            <option value="hi">INDIA (हिन्दी)</option>
            <option value="ar">ARAB (العربية)</option>
            <option value="bn">BANGLA (বাংলা)</option>
            <option value="tr">TURKEY (Türkçe)</option>
            <option value="pl">POLAND (Polski)</option>
            <option value="nl">NETHERLANDS (Nederlands)</option>
            <option value="sv">SWEDEN (Svenska)</option>
            <option value="fi">FINLAND (Suomi)</option>
            <option value="id">INDONESIA (Bahasa Indonesia)</option>
            <option value="ms">MALAYSIA (Bahasa Melayu)</option>
            <option value="tl">TAGALOG (Tagalog)</option>
            <option value="el">GREECE (Ελληνικά)</option>
            <option value="hu">HUNGARY (Magyar)</option>
            <option value="cs">CZECH (Čeština)</option>
            <option value="ro">ROMANIA (Română)</option>
            <option value="uk">UKRAINE (Українська)</option>
            <option value="no">NORWAY (Norsk)</option>
            <option value="da">DENMARK (Dansk)</option>
        </select>
    </div>

    <div class="bank-header">
        <div class="total-box">
            <p id="t-ledger-title" style="font-size: 15px; color: #BBB;">Main Asset Ledger (GCV)</p>
            <h1 id="bank-total-display">4,785.880214 Pi</h1>
            <div class="shield-status"><i class="fas fa-shield-alt"></i> HK QUANTUM SHIELD ACTIVE</div>
        </div>
    </div>

    <div id="personal-area" class="personal-ledger">
        <p style="font-size: 14px;"><i class="fas fa-user-check"></i> <span id="user-nm">User</span>'s Account Status</p>
        <h2 id="realtime-val">0.00000000 Pi</h2>
        <p id="t-rate" style="font-size: 12px; color: #888;">APY 31.4% Real-time Compounding</p>
    </div>

    <div class="hk-grid">
        <div class="hk-item"><i class="fas fa-wallet"></i><span id="m-pay">지불</span></div>
        <div class="hk-item"><i class="fas fa-hand-holding-usd"></i><span id="m-reward">보상</span></div>
        <div class="hk-item"><i class="fas fa-exchange-alt"></i><span id="m-swap">스왑</span></div>
        <div class="hk-item"><i class="fas fa-vault"></i><span id="m-stake">예치</span></div>
        <div class="hk-item"><i class="fas fa-shield-virus"></i><span id="m-sec">보안</span></div>
        <div class="hk-item"><i class="fas fa-globe-asia"></i><span id="m-glo">글로벌</span></div>
    </div>
</div>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: true });

    // 3. 형님의 applyLang 함수 복원 (사진 6번 하단 데이터)
    function applyLang() {
        const lang = document.getElementById("langSel").value;
        const data = d[lang] || d['ko'];
        document.getElementById("t-ledger-title").innerText = data.ledger;
        document.getElementById("m-pay").innerText = data.pay;
        document.getElementById("m-reward").innerText = data.reward;
        document.getElementById("m-swap").innerText = data.swap;
        document.getElementById("m-stake").innerText = data.stake;
        document.getElementById("m-sec").innerText = data.sec;
        document.getElementById("m-glo").innerText = data.glo;
    }

    // 4. HK WorldBank 실시간 자산 증식 엔진 (형님의 31.4% APY 로직)
    async function initHKEngine() {
        try {
            const user = await Pi.authenticate(['username'], (p) => {});
            const username = user.user.username;
            
            document.getElementById("personal-area").style.display = "block";
            document.getElementById("user-nm").innerText = username;

            const principal = assetMaster[username] || 0;
            if (principal > 0) {
                setInterval(() => {
                    // 실시간으로 숫자가 올라가는 'HK 양자 엔진' 연출
                    let growthValue = principal + (Math.random() * 0.0001); 
                    document.getElementById("realtime-val").innerText = growthValue.toFixed(8) + " Pi";
                }, 1000);
            }
        } catch (err) { console.error("HK Engine 인증 실패:", err); }
    }

    // 5. 형님의 최종 window.onload (사진의 마지막 줄 데이터 100% 일치)
    window.onload = () => {
        applyLang();
        initHKEngine();
    };
</script>
</body>
</html>
