<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WorldBank 100% Full</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>Pi.init({ version: "2.0", sandbox: false });</script>
    <style>
        :root { --y: #f39c12; --g: #00ff00; --bg: #000; --c: #0d0d0d; --r: #ff4747; --b: #00ccff; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; text-align: center; }
        
        /* 언어 선택창 (나열형) */
        #langList { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; overflow-y: auto; padding: 20px; }
        .lang-item { padding: 15px; border-bottom: 1px solid #333; font-size: 18px; color: var(--y); cursor: pointer; }
        
        .h { display: flex; justify-content: space-between; align-items: center; padding: 10px; }
        .logo { font-size: 24px; font-weight: 900; color: var(--y); }
        .l-btn { color: #f39c12; border: 1.5px solid #f39c12; background: none; padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .node { font-size: 12px; color: var(--g); text-align: left; margin: 15px 0 20px 10px; font-weight: bold; }
        
        .card { background: var(--c); border-radius: 25px; padding: 30px 15px; position: relative; margin-bottom: 25px; border: 1px solid #1a1a1a; }
        .apr { color: var(--g); font-size: 15px; font-weight: bold; position: absolute; top: 20px; right: 20px; }
        .t { color: var(--y); font-size: 16px; font-weight: bold; text-align: left; margin-bottom: 25px; margin-left: 10px; }
        .in-box { border-bottom: 3.5px solid var(--y); width: 80%; margin: 0 auto 30px auto; padding-bottom: 8px; }
        .pi-in { background: transparent; border: none; color: #fff; font-size: 52px; font-weight: 900; width: 75%; text-align: right; outline: none; }
        .gcv { font-size: 18px; color: var(--g); border: 2.5px solid var(--g); border-radius: 40px; padding: 18px; display: block; width: 90%; margin: 0 auto; font-weight: bold; background: transparent; cursor: pointer; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 35px; }
        .item { background: var(--c); border-radius: 20px; padding: 22px 5px; border: 1px solid #1a1a1a; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .m-txt { font-size: 13px; font-weight: bold; }
        
        .st-info { border-left: 5px solid var(--y); text-align: left; padding-left: 15px; margin-bottom: 30px; }
        .lp-v { font-size: 38px; font-weight: 900; margin: 12px 0; }
        .btn-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .b-btn { height: 50px; border-radius: 12px; color: #fff; font-size: 14px; font-weight: bold; border: none; }
        .center-btn { width: 100%; height: 60px; background: var(--r); color: #fff; border: none; border-radius: 18px; font-size: 17px; font-weight: bold; margin-bottom: 30px; }
        
        .sns-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .sns-c { background: var(--c); border-radius: 25px; padding: 20px 10px; border: 1px solid #1a1a1a; text-decoration: none; color: #fff; display: block; }
        footer { font-size: 10px; color: #444; padding: 20px 0; border-top: 1px solid #111; line-height: 1.6; }
    </style>
</head>
<body>

<div id="langList">
    <div style="font-size: 24px; font-weight: 900; color: #fff; margin-bottom: 20px;">CHOOSE LANGUAGE</div>
    <div id="listItems"></div>
    <button onclick="closeLang()" style="margin-top:20px; padding:10px 30px; border-radius:10px; background:var(--r); color:#fff; border:none; font-weight:bold;">CLOSE</button>
</div>

<div class="h">
    <div class="logo">HK WORLD BANK</div>
    <button id="langBtn" class="l-btn" onclick="openLang()">KR (한국어)</button>
</div>
<div id="nd" class="node">🚀 SECURE NODE: HK-V190-SUPREME</div>

<div class="card">
    <div class="apr">APR 31.4%</div>
    <div id="ct" class="t">메인 자산 통합 원장</div>
    <div class="in-box">
        <input type="number" id="pi" class="pi-in" value="400.0000" step="0.0001">
        <span style="color:#f39c12; font-size:38px; font-weight:900;">Pi</span>
    </div>
    <button id="gb" class="gcv" onclick="deposit()">가치 평가: $ 125,663,600<br>(GCV)</button>
</div>

<div class="grid">
    <div class="item">🚀<span id="m1" class="m-txt">송금</span></div>
    <div class="item">🛒<span id="m2" class="m-txt">결제</span></div>
    <div class="item">💿<span id="m3" class="m-txt">예치</span></div>
    <div class="item">🎁<span id="m4" class="m-txt">보상</span></div>
    <div class="item">⚖️<span id="m5" class="m-txt">소득</span></div>
    <div class="item">🔄<span id="m6" class="m-txt">스왑</span></div>
</div>

<div class="st-info">
    <span id="st" style="color:var(--y); font-weight:bold;">STAKING APR 31.4%</span><br>
    <span id="lt" style="color:#f39c12; font-size:13px; font-weight:bold;">유동성 풀 $</span>
    <div class="lp-v">88,401,773,756</div>
    <div id="sh" style="color:var(--b); font-size:12px; font-weight:bold;">HK_퀀텀_쉴드_활성</div>
</div>

<div class="btn-row">
    <button id="b1" class="b-btn" style="background:#222; border:1px solid var(--y);">Pi 수량</button>
    <button id="b2" class="b-btn" style="background:#f39c12;">SWAP</button>
    <button id="b3" class="b-btn" style="background:#27ae60;">LP 공급</button>
</div>

<button id="sb" class="center-btn">🎧 24/7 글로벌 고객지원센터</button>

<div class="sns-grid">
    <a href="https://youtube.com/@hyekong2025" class="sns-c">
        <span style="color:#ff0000; font-size:24px;">▶</span><br>
        <span style="font-size:16px; font-weight:800;">hyekong2025</span><br><span style="font-size:11px; color:#888;">YouTube</span>
    </a>
    <a href="https://tiktok.com/@hyekong2025" class="sns-c">
        <span style="color:#fff; font-size:24px;">♪</span><br>
        <span style="font-size:16px; font-weight:800;">hyekong2025</span><br><span style="font-size:11px; color:#888;">TikTok</span>
    </a>
</div>

<footer>
    © 2026 HK GROUP GLOBAL MANAGEMENT. GCV<br>
    CHAIRMAN LEE JAE-WAN. ALL RIGHTS RESERVED.
</footer>

<script>
    // 50개 언어 핵심 데이터 (일부 요약)
    const langData = [
        {n:'KR (한국어)', t:['메인 자산 통합 원장','가치 평가','송금','결제','예치','보상','소득','스왑','유동성 풀 $','HK_퀀텀_쉴드_활성','Pi 수량','24/7 글로벌 고객지원센터']},
        {n:'EN (English)', t:['Asset Ledger','Value Eval','Send','Pay','Stake','Reward','Income','Swap','Liquidity Pool $','HK_QUANTUM_SHIELD_ACTIVE','Pi Amt','Support Center']},
        {n:'CN (中国语)', t:['资产账本','价值评估','转账','支付','押注','奖励','收入','交换','流动性池 $','HK_量子屏蔽','Pi 数量','全球客服']},
        {n:'JP (日本語)', t:['資産台帳','価値評価','送금','決済','預置','報酬','所得','スワップ','流動性プール','HK_量子シールド','Pi 数量','サポート']},
        {n:'AR (العربية)', t:['دفتر الأصول','تقييم','إرسال','دفع','رهان','مكافأة','دخل','تبادل','سيولة','درع الكم','كمية','دعم']},
        {n:'UA (Українська)', t:['Активи','Оцінка','Надіслати','Оплата','Ставка','Нагорода','Дохід','Обмін','Пул','Щит','К-ть','Підтримка']},
        {n:'ES (Español)', t:['Libro Activos','Evaluación','Enviar','Pagar','Apostar','Premio','Renta','Canje','Fondo','Escudo','Cant','Soporte']},
        {n:'DE (Deutsch)', t:['Asset-Ledger','Bewertung','Senden','Zahlen','Einsatz','Belohnung','Einkommen','Swap','Pool','Schild','Menge','Support']},
        {n:'RU (Русский)', t:['Активы','Оценка','Отправить','Оплата','Ставка','Награда','Доход','Обмен','Пул','Щит','Кол-во','Поддержка']},
        {n:'FR (Français)', t:['Grand livre','Évaluation','Envoyer','Payer','Miser','Récompense','Revenu','Échange','Pool','Bouclier','Qté','Support']},
        // ... (50개 리스트 나열 가능)
    ];

    function openLang() { document.getElementById('langList').style.display = 'block'; }
    function closeLang() { document.getElementById('langList').style.display = 'none'; }

    const listDiv = document.getElementById('listItems');
    langData.forEach((l, idx) => {
        const div = document.createElement('div');
        div.className = 'lang-item';
        div.innerText = l.n;
        div.onclick = () => applyLang(idx);
        listDiv.appendChild(div);
    });

    function applyLang(idx) {
        const l = langData[idx];
        document.getElementById('langBtn').innerText = l.n;
        document.getElementById('ct').innerText = l.t[0];
        document.getElementById('gb').innerHTML = l.t[1] + ': $ 125,663,600<br>(GCV)';
        ['m1','m2','m3','m4','m5','m6'].forEach((id, i) => document.getElementById(id).innerText = l.t[i+2]);
        document.getElementById('lt').innerText = l.t[8];
        document.getElementById('sh').innerText = l.t[9];
        document.getElementById('b1').innerText = l.t[10];
        document.getElementById('sb').innerText = '🎧 ' + l.t[11];
        closeLang();
    }

    async function deposit() {
        const amt = parseFloat(document.getElementById('pi').value);
        try {
            await Pi.authenticate(['payments'], function(p){});
            await Pi.createPayment({amount: amt, memo: "HK WB GCV", metadata: {node: "V190"}}, 
            {onReadyForServerCompletion: (id, txid) => alert("✅ Deposit Success!")});
        } catch(e) { alert("Use Pi Browser!"); }
    }
</script>
</body>
</html>
