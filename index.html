        :root {
            --primary-gold: #ffeb3b;

            --bg-black: #000000;

        body {

        .phone-frame {

            background: var(--bg-black);
            padding: 25px;
            position: relative;
            border-left: 1px solid #222;
            border-right: 1px solid #222;
        }

        /* 헤더 골드 텍스트 */
        .header-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            text-align: center;
            color: var(--primary-gold);
            margin: 40px 0 20px 0;
            text-shadow: 0 0 15px rgba(255, 235, 59, 0.4);
            letter-spacing: -1px;
        }

        /* 통합 원장 섹션 */
        .ledger-container {
            background: linear-gradient(145deg, #1a1a1a, #050505);
            border-radius: 35px;
            padding: 40px 20px;
            border: 1px solid #333;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .ledger-sub {
            color: var(--primary-gold);
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* 10억 단위 대응 유연 폰트 */
        .main-balance {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 10vw, 3.5rem);
            font-weight: 900;
            margin-bottom: 20px;
        }

        .gcv-label {
            border: 2.5px solid var(--gcv-green);
            border-radius: 60px;
            padding: 10px 25px;
            display: inline-block;
            color: var(--gcv-green);
            font-weight: 800;
            font-size: 0.9rem;
            background: rgba(0, 200, 83, 0.05);
        }

        /* 6버튼 그리드 */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 40px;
        }

        .menu-card {
            background: var(--card-gray);
            border: 1px solid #222;
            border-radius: 25px;
            padding: 25px 10px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .menu-card:active {
            transform: scale(0.9);
            background: #222;
        }

        .menu-card i {
            font-size: 2rem;
            margin-bottom: 15px;
            display: block;
        }

        .menu-text {
            font-size: 0.8rem;
            font-weight: 700;
            color: #eee;
        }

        /* 예치/스테이킹 상세 */
        .stake-box {
            background: #080808;
            border: 1px solid #222;
            border-radius: 30px;
            padding: 30px;
            margin-top: 30px;
            position: relative;
        }

        .stake-info {
            color: var(--primary-gold);
            font-weight: 800;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .counting-num {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 25px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .lang-nav {

            top: 20px;
            right: 25px;
        }

        .lang-btn {
            background: #222;

            border-radius: 10px;
            padding: 6px 12px;
            font-size: 0.8rem;

            padding: 20px;
            border-radius: 25px;

            font-weight: 900;
            font-size: 0.85rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;

            font-size: 0.7rem;
            color: #666;
