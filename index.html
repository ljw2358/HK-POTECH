<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK | GLOBAL CORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --pi: #FF8C00; --neon: #00FF7F; --red: #FF4500; --bg: #000; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; }
        .wrapper { width: 100%; max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 80px; }
        
        /* 상단 네비 */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 20px; }
        .node-info { color: var(--neon); font-size: 11px; font-weight: 900; }
        .lang-btn { border: 2px solid var(--gold); color: var(--gold); padding: 6px 15px; border-radius: 10px; font-size: 14px; font-weight: 900; cursor: pointer; }

        /* 헤더 */
        .header { text-align: center; padding: 10px 0 30px; }
        .logo { font-size: 40px; font-weight: 950; color: var(--gold); margin: 0; }

        /* 자산 카드 */
        .asset-card { background: linear-gradient(160deg, #1a1a1a, #000); border: 1.5px solid #222; border-radius: 35px; margin: 0 20px; padding: 40px 20px; text-align: center; position: relative; }
        .apr-tag { position: absolute; top: 20px; right: 25px; color: var(--neon); font-weight: 950; }
        .balance { font-size: 50px; font-weight: 950; margin: 20px 0; }
        .gcv-label { display: inline-block; border: 3px solid var(--neon); border-radius: 25px; padding: 15px 30px; color: var(--neon); font-weight: 950; font-size: 18px; }

        /* 6대 아이콘 */
        .icon-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 35px 25px; }
        .icon-item { text-align: center; }
        .icon-box { width: 75px; height: 75px; background: rgba(255,255,255,0.07); border-radius: 22px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; }
        .icon-box i { font-size: 30px; }

        /* 하단 버튼 & 유동성 */
        .st-box { display: flex; gap: 15px; padding: 0 30px; margin-bottom: 30px; border-left: 5px solid var(--gold); margin-left: 20px; }
        .btn-group { display: flex; gap: 10px; padding: 0 20px; margin-bottom: 30px; }
        .btn-core { flex: 1; height: 70px; border-radius: 18px; border: none; font-size: 17px; font-weight: 950; display: flex; align-items: center; justify-content: center; }
        .b-pi { background: #000; border: 2.5px solid var(--gold); color: #fff; }
        .b-swap { background: var(--pi); color: #fff; }
        .b-lp { background: var(--neon); color: #000; }

        /* SNS 섹션 */
        .sns-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; margin-top: 30px; }
        .sns-card { background: #0d0d0d; padding: 20px; border-radius: 25px; border: 1.5px solid #1a1a1a; text-align: center; }

        /* 팝업 모달 */
        #lModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .l-box { background: #fff; color: #000; width: 90%; max-height: 80vh; border-radius: 35px; padding: 30px; overflow-y: auto; }
        .l-item { display: flex; align-items: center; padding: 18px 0; border-bottom: 1px solid #eee; font-weight: 900; font-size: 19px; cursor: pointer; }
    </style>
</head>
<body>

<div class="wrapper">
    <nav class="top-nav">
        <div class="node-info">🛰️ SECURE NODE: HK-V190-SUPREME</div>
        <div class="lang-btn" id="curLang" onclick="tgL()">KR (한국어) ⌵</div>
    </nav>

    <header class="header"><h1 class="logo" id="t-logo">HK WORLD BANK</h1></header>

    <section class="asset-card">
        <div class="apr-tag">APR 31.4%</div>
        <div style="color:var(--gold); font-weight:900;" id="t-asset-lab">메인 자산 통합 원장</div>
        <div class="balance">400.0000 <span style="color:var(--pi); font-size:24px;">Pi</span></div>
        <div class="gcv-label" id="t-gcv">가치 평가: $ 125,663,600<br>(GCV CONSENSUS)</div>
    </section>

    <section class="icon-grid" id="mainGrid"></section>

    <section class="st-box">
        <div>
            <div style="color:var(--pi); font-weight:950;" id="t-st1">STAKING APR 31.4%</div>
            <div style="color:var(--gold); font-weight:950;" id="t-st2">유동성 풀 $</div>
            <div style="font-size:26px; font-weight:950;">88,401,773,756</div>
            <div style="color:var(--blue); font-weight:950;" id="t-st3">HK_퀀텀_쉴드_보안_활성</div>
        </div>
    </section>

    <div class="btn-group">
        <button class="btn-core b-pi" id="b-1">Pi 수량</button>
        <button class="btn-core b-swap" id="b-2">SWAP</button>
        <button class="btn-core b-lp" id="b-3">LP 공급</button>
    </div>

    <div style="padding:0 20px;"><button style="width:100%; height:75px; background:var(--red); border-radius:22px; border:none; color:#fff; font-size:20px; font-weight:950;" id="t-cs">🎧 24/7 글로벌 고객지원센터</button></div>

    <div class="sns-grid">
        <div class="sns-card"><i class="fa-brands fa-youtube" style="color:#f00; font-size:35px;"></i><div style="font-weight:900; margin-top:10px;">hyekong2025</div><small style="color:#666;">YouTube</small></div>
        <div class="sns-card"><i class="fa-brands fa-tiktok" style="font-size:35px;"></i><div style="font-weight:900; margin-top:10px;">hyekong2025</div><small style="color:#666;">TikTok</small></div>
    </div>

    <footer style="text-align:center; padding:50px 0; color:#444; font-size:12px; font-weight:900;">
        © 2026 HK GROUP GLOBAL HEGEMONY.<br>CHAIRMAN LEE JAEWAN.
    </footer>
</div>

<div id="lModal"><div class="l-box" id="lList"></div></div>

<script>
    /* 20개국어 매핑 데이터 (변환의 핵심!) */
    const DB = {
        ko: { n: "KR (한국어)", l: "HK WORLD BANK", a: "메인 자산 통합 원장", g: "가치 평가: $ 125,663,600", m: ["송금","결제","예치","보상","소득","스왑"], b: ["Pi 수량","SWAP","LP 공급"], cs: " 24/7 글로벌 고객지원센터", s: ["STAKING APR 31.4%", "유동성 풀 $", "HK_퀀텀_쉴드_활성"] },
        ua: { n: "UA (Українська)", l: "HK СВІТОВИЙ БАНК", a: "ГОЛОВНА КНИГА АКТИВІВ", g: "ОЦІНКА: $ 125,663,600", m: ["ПЕРЕКАЗ","ОПЛАТА","ДЕПОЗИТ","НАГОРОДА","ДОХІД","ОБМІН"], b: ["К-сть Pi","SWAP","LP Поставка"], cs: " 24/7 ПІДТРИМКА ГЛОБАЛЬНО", s: ["СТЕЙКІНГ 31.4%", "ПУЛ ЛІКВІДНОСТІ $", "HK_КВАНТОВИЙ_ЩИТ"] },
        ar: { n: "AR (العربية)", l: "HK مصرف العالم", a: "دفتر الأصول الرئيسي", g: "التقييم: $ 125,663,600", m: ["إرسال","دفع","تخزين","مكافأة","دخل","تبادل"], b: ["كمية Pi","SWAP","تزويد LP"], cs: " دعم عالمي 24/7", s: ["تخزين 31.4%", "مجمع السيولة $", "درع HK الكمي"] },
        in: { n: "IN (हिन्दी)", l: "HK वर्ल्ड बैंक", a: "मुख्य संपत्ति लेजर", g: "मूल्यांकन: $ 125,663,600", m: ["भेजें","भुगतान","जमा","इनाम","आय","स्वैप"], b: ["Pi मात्रा","SWAP","LP आपूर्ति"], cs: " 24/7 वैश्विक सहायता", s: ["स्टे킹 31.4%", "लिक्विडिटी पूल $", "HK_क्वांटम_शील्ड"] },
        us: { n: "US (English)", l: "HK WORLD BANK", a: "MAIN ASSET LEDGER", g: "VALUATION: $ 125,663,600", m: ["SEND","PAY","STAKE","REWARD","INCOME","SWAP"], b: ["Pi Qty","SWAP","LP Supply"], cs: " 24/7 GLOBAL SUPPORT", s: ["STAKING 31.4%", "LIQUIDITY POOL $", "HK_QUANTUM_SHIELD"] },
        vn: { n: "VN (Tiếng Việt)", l: "HK NGÂN HÀNG THẾ GIỚI", a: "SỔ CÁI TÀI SẢN CHÍNH", g: "ĐỊNH GIÁ: $ 125,663,600", m: ["GỬI","THANH TOÁN","GỬI TIẾT KIỆM","THƯỞNG","THU NHẬP","SWAP"], b: ["Số lượng Pi","SWAP","Cung cấp LP"], cs: " 24/7 HỖ TRỢ TOÀN CẦU", s: ["LÃI SUẤT 31.4%", "BỂ THANH KHOẢN $", "HK_GIÁP_LƯỢNG_TỬ"] }
        // 나머지 국가들도 이 패턴으로 확장 가능
    };
    ["es","pt","de","fr","it","ru","id","th","jp","cn","tr","ph","my","pl"].forEach(c => { DB[c] = DB.us; DB[c].n = c.toUpperCase() + " (Global)"; });

    const ICONS = [{i:"fa-paper-plane",c:"#4da6ff"},{i:"fa-shopping-bag",c:"#ff66cc"},{i:"fa-utensils",c:"#fff"},{i:"fa-gift",c:"var(--gold)"},{i:"fa-balance-scale",c:"#b3ff66"},{i:"fa-sync",c:"#9966ff"}];

    function tgL() { const m = document.getElementById('lModal'); m.style.display = m.style.display==='flex'?'none':'flex'; }

    /* [실시간 언어 변환 엔진] */
    window.setL = function(k) {
        const d = DB[k];
        document.getElementById('curLang').innerText = d.n + " ⌵";
        document.getElementById('t-logo').innerText = d.l;
        document.getElementById('t-asset-lab').innerText = d.a;
        document.getElementById('t-gcv').innerHTML = d.g + "<br>(GCV CONSENSUS)";
        document.getElementById('b-1').innerText = d.b[0];
        document.getElementById('b-2').innerText = d.b[1];
        document.getElementById('b-3').innerText = d.b[2];
        document.getElementById('t-cs').innerText = "🎧 " + d.cs;
        document.getElementById('t-st1').innerText = d.s[0];
        document.getElementById('t-st2').innerText = d.s[1];
        document.getElementById('t-st3').innerText = d.s[2];

        const grid = document.getElementById('mainGrid'); grid.innerHTML = '';
        d.m.forEach((v, i) => {
            grid.innerHTML += `<div class="icon-item"><div class="icon-box"><i class="fa-solid ${ICONS[i].i}" style="color:${ICONS[i].c}"></i></div><div style="font-weight:800; font-size:15px;">${v}</div></div>`;
        });
        tgL();
    };

    const list = document.getElementById('lList');
    Object.keys(DB).forEach(k => {
        list.innerHTML += `<div class="l-item" onclick="setL('${k}')"><span>${DB[k].n}</span></div>`;
    });

    window.onload = () => setL('ko');
</script>
</body>
</html>
